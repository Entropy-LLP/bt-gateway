services:
  - type: web
    name: bt-gateway
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DNS_RESOLVER
        value: "8.8.8.8"
      - key: AUTH_SERVICE_URL
        sync: false
      - key: BOOKING_SERVICE_URL
        sync: false
      - key: PRICING_SERVICE_URL
        sync: false
      - key: PAYMENT_SERVICE_URL
        sync: false
      - key: CARGO_SERVICE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
    healthCheckPath: /health
