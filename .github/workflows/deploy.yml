name: deploy

# bt-gateway (nginx) -> Cloud Run, on push to main.
# Pipeline: build -> smoke (nginx renders + boots, GET /health == 200) -> push -> deploy.
# Auth to GCP is keyless via GitHub OIDC + Workload Identity Federation (no JSON key).
# Deploy is image-only: existing Cloud Run env (upstream URLs, CORS), port and runtime SA preserved.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-bt-gateway
  cancel-in-progress: false

jobs:
  ci-cd:
    runs-on: ubuntu-latest
    env:
      SERVICE: bt-gateway
      REGION: asia-south1
      PROJECT: project-aa0faf06-c115-438a-a36
    steps:
      - uses: actions/checkout@v4

      # Keyless auth to GCP
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: project-aa0faf06-c115-438a-a36
          workload_identity_provider: projects/752385541585/locations/global/workloadIdentityPools/github-pool/providers/github
          service_account: bt-cicd-deployer@project-aa0faf06-c115-438a-a36.iam.gserviceaccount.com
      - uses: google-github-actions/setup-gcloud@v2

      # 1. Build image
      - name: Build image
        run: |
          set -euo pipefail
          IMG="${REGION}-docker.pkg.dev/${PROJECT}/bt/${SERVICE}:${GITHUB_SHA}"
          echo "IMG=$IMG" >> "$GITHUB_ENV"
          docker build -t "$IMG" .

      # 2. Smoke test: nginx renders + boots, /health returns 200 (upstreams need not be live)
      - name: Smoke test
        run: |
          set -euo pipefail
          docker run -d --name smoke -p 8080:80 \
            -e AUTH_SERVICE_URL=http://auth.local:3001 \
            -e BOOKING_SERVICE_URL=http://booking.local:3002 \
            -e PRICING_SERVICE_URL=http://pricing.local:3003 \
            -e PAYMENT_SERVICE_URL=http://payment.local:3004 \
            -e CARGO_SERVICE_URL=http://cargo.local:3005 \
            -e TRACKING_SERVICE_URL=http://tracking.local:3006 \
            -e CORS_ALLOWED_ORIGINS='*' \
            "$IMG"
          ok=0
          for _ in $(seq 1 20); do
            if curl -fsS http://localhost:8080/health >/dev/null 2>&1; then ok=1; break; fi
            sleep 2
          done
          echo "----- container logs -----"; docker logs smoke || true
          docker rm -f smoke >/dev/null 2>&1 || true
          [ "$ok" = "1" ] || { echo "Smoke test failed: gateway /health never returned 200"; exit 1; }
          echo "Smoke test passed."

      # 3. Push image
      - name: Push image
        run: |
          set -euo pipefail
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
          docker push "$IMG"

      # 4. Deploy to Cloud Run
      - name: Deploy
        run: |
          set -euo pipefail
          gcloud run deploy "$SERVICE" \
            --image "$IMG" \
            --region "$REGION" \
            --project "$PROJECT" \
            --quiet
